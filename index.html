<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<title>デッキジェネレーター 完全安定版</title>

<style>
body{
  font-family:sans-serif;
  background:#111;
  color:#fff;
  padding:20px;
}
canvas{
  border:1px solid #444;
  display:block;
  margin-top:20px;
  max-width:100%;
}
input,textarea,button{
  display:block;
  margin:8px 0;
  width:100%;
  max-width:420px;
}
textarea{ height:80px; }
</style>

</head>
<body>

<h2>デッキジェネレーター（完全安定版）</h2>

<label>デッキ画像: <input type="file" id="deck" accept="image/*"></label>

<label>アイコン画像: <input type="file" id="icon" accept="image/*"></label>

<label>コメント:

<textarea id="comment">いいね＆フォローよろしく！</textarea></label>

<label>プレイヤー名: <input type="text" id="creator"></label>

<label>Twitter ID（@なし）: <input type="text" id="twitter"></label>

<button onclick="generate()">生成</button> <button onclick="saveImg()">保存</button>

<canvas id="canvas"></canvas>

<script>

let lastBlob=null;

function loadImg(file){
  return new Promise((res,rej)=>{
    const img=new Image();
    img.onload=()=>res(img);
    img.onerror=()=>rej(new Error("画像読み込み失敗"));
    img.src=URL.createObjectURL(file);
  });
}

function neonRect(ctx,x,y,w,h){
  ctx.strokeStyle="#00ffff";
  ctx.lineWidth=4;
  ctx.shadowColor="#00ffff";
  ctx.shadowBlur=15;
  ctx.strokeRect(x,y,w,h);
  ctx.shadowBlur=0;
}

function multiline(ctx,text,x,y,size,lineH){
  ctx.font=`bold ${size}px sans-serif`;
  ctx.lineWidth=3;
  ctx.strokeStyle="#000";
  ctx.fillStyle="#00ffff";

  let offset=0;
  for(const line of text.split("\n")){
    ctx.strokeText(line,x,y+offset);
    ctx.fillText(line,x,y+offset);
    offset+=lineH;
  }
  return offset;
}

  try{

    const iconFile=document.getElementById("icon").files[0];
    const creator=document.getElementById("creator").value.trim();

      alert("デッキ画像・アイコン・プレイヤー名は必須");
      return;
    }

    const twitter=document.getElementById("twitter").value.trim();

      loadImg(deckFile),

    ]);

    const deckH=deck.height*(deckW/deck.width);

    const grad=ctx.createLinearGradient(0,0,canvas.width,canvas.height);
    grad.addColorStop(0,"#0a0a0a");

    ctx.fillStyle=grad;
    ctx.fillRect(0,0,canvas.width,canvas.height);

    const topY=pad+40;

    // アイコン丸表示
    ctx.save();

    ctx.drawImage(icon,pad,topY,iconSize,iconSize);

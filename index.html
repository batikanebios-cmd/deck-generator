<html>
<head>

<body>

<h2>デッキ紹介ジェネレーター</h2>

<input type="file" id="deck" accept="image/*">
<input type="file" id="icon" accept="image/*">
<input type="text" id="creator" placeholder="プレイヤー名">
<input type="text" id="comment" placeholder="コメント">
<input type="text" id="twitter" placeholder="TwitterID">
<input type="text" id="qrUrl" placeholder="QR用URL">

<button id="genBtn">生成</button> <button id="saveBtn">保存</button>

<canvas id="canvas"></canvas>

<script>

const genBtn=document.getElementById("genBtn");
const saveBtn=document.getElementById("saveBtn");
const canvas=document.getElementById("canvas");
const ctx=canvas.getContext("2d");

let lastBlob=null;

// ★安全な画像読み込み
function loadImage(file){
  return new Promise((resolve,reject)=>{
    if(!file) return reject("画像未選択");

    const reader=new FileReader();
    reader.onload=e=>{
      const img=new Image();
      img.onload=()=>resolve(img);
      img.onerror=()=>reject("画像読み込み失敗");
      img.src=e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

// QR風
function drawQR(x,y,size,text){
  if(!text) return;
  const cells=25;
  const cell=size/cells;

  ctx.fillStyle="#fff";
  ctx.fillRect(x,y,size,size);

  ctx.fillStyle="#000";
  let seed=text.length;

  function r(){
    seed=(seed*9301+49297)%233280;
    return seed/233280;
  }

  for(let i=0;i<cells;i++){
    for(let j=0;j<cells;j++){
      if(r()>0.5)
        ctx.fillRect(x+i*cell,y+j*cell,cell,cell);
    }
  }
}

function neonRect(x,y,w,h){
  ctx.strokeStyle="#00ffff";
  ctx.lineWidth=4;
  ctx.strokeRect(x,y,w,h);
}

    ctx.fillText(comment,textX,y+95);

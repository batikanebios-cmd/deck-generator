<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>デッキレシピジェネレーター 完成版</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcode-generator/1.4.4/qrcode.min.js"></script>

<style>
body{
  font-family:sans-serif;
  background:#111;
  color:#fff;
  padding:20px;
}

/* ===== 上部 Twitter ID ===== */
.top-bar{
  position:sticky;
  top:0;
  z-index:999;
  display:flex;
  justify-content:flex-end;
  padding:8px 0;
}

.twitter-link{
  display:flex;
  align-items:center;
  gap:8px;
  text-decoration:none;
  font-weight:bold;
  color:#00ffff;
  background:rgba(0,255,255,0.12);
  padding:6px 12px;
  border-radius:999px;
  border:1px solid #00ffff;
  box-shadow:0 0 8px #00ffff55;
  transition:.2s;
}

.twitter-link:hover{
  background:#00ffff22;
  transform:translateY(-1px);
}

.twitter-icon{
  width:16px;
  height:16px;
  fill:#00ffff;
}

/* ===== 元のUI ===== */

canvas{
  border:1px solid #444;
  display:block;
  margin-top:20px;
  max-width:100%;
}

input,textarea,button{
  display:block;
  margin:8px 0;
  width:100%;
  max-width:420px;
}

textarea{
  height:70px;
}
</style>
</head>

<body>

<!-- ⭐ 作者ID表示 -->
<div class="top-bar">
  <a
    class="twitter-link"
    href="https://twitter.com/YourID"
    target="_blank"
    rel="noopener noreferrer"
  >
    <svg class="twitter-icon" viewBox="0 0 24 24">
      <path d="M18.244 2H21.5l-7.53 8.6L22.5 22h-6.65l-5.2-6.8L4.7 22H1.44l8.05-9.2L1.5 2h6.8l4.7 6.2L18.244 2z"/>
    </svg>
    @YourID
  </a>
</div>

<h2>デッキレシピジェネレーター（完成版）</h2>

<label>デッキ A:
<input type="file" id="deck" accept="image/*"></label>

<label>アイコン B:
<input type="file" id="icon" accept="image/*"></label>

<label>QR用URL（任意）:
<input type="text" id="qrUrl"></label>

<label>ニューロン文面:
<textarea id="qrText">←ニューロンQRコード
　いいね&フォローよろしく</textarea></label>

<label>プレイヤー名:
<input type="text" id="creator"></label>

<button onclick="generate()">生成</button>
<button onclick="saveToiPhone()">iPhoneに保存</button>

<canvas id="canvas"></canvas>

<script>
// ===== 以下は元コードそのまま =====

async function loadImg(file){
  return new Promise((res,rej)=>{
    const img=new Image();
    img.onload=()=>res(img);
    img.onerror=()=>rej();
    img.src=URL.createObjectURL(file);
  });
}

function drawCyberBackground(ctx,w,h){
  const grad=ctx.createLinearGradient(0,0,w,h);
  grad.addColorStop(0,"#0d0d0d");
  grad.addColorStop(1,"#001a33");
  ctx.fillStyle=grad;
  ctx.fillRect(0,0,w,h);
}

function generateQR(text,size){
  if(!text || typeof qrcode==="undefined") return null;

  const qr=qrcode(0,'M');
  qr.addData(text);
  qr.make();

  const count=qr.getModuleCount();
  const tile=size/count;

  const c=document.createElement("canvas");
  c.width=size;
  c.height=size;
  const ctx=c.getContext("2d");

  ctx.fillStyle="#fff";
  ctx.fillRect(0,0,size,size);

  ctx.fillStyle="#000";
  for(let r=0;r<count;r++){
    for(let col=0;col<count;col++){
      if(qr.isDark(r,col)){
        ctx.fillRect(col*tile,r*tile,tile,tile);
      }
    }
  }
  return c;
}

function drawNeonRect(ctx,x,y,w,h){
  ctx.strokeStyle="#00ffff";
  ctx.lineWidth=4;
  ctx.shadowColor="#00ffff";
  ctx.shadowBlur=15;
  ctx.strokeRect(x,y,w,h);
  ctx.shadowBlur=0;
}

function drawMultilineText(ctx,text,x,y,maxWidth,fontSize=26,lineHeight=32){
  if(!text) return;

  ctx.font=`bold ${fontSize}px sans-serif`;
  ctx.lineWidth=3;
  ctx.strokeStyle="#000";
  ctx.fillStyle="#00ffff";

  const lines=text.split("\n");
  let offsetY=0;

  for(const line of lines){
    let current="";

    for(const char of line){
      const test=current+char;
      if(ctx.measureText(test).width>maxWidth){
        ctx.strokeText(current,x,y+offsetY);
        ctx.fillText(current,x,y+offsetY);
        current=char;
        offsetY+=lineHeight;
      }else{
        current=test;
      }
    }

    if(current){
      ctx.strokeText(current,x,y+offsetY);
      ctx.fillText(current,x,y+offsetY);
      offsetY+=lineHeight;
    }
  }
}

let lastBlob=null;

async function generate(){

  const deckFile=document.getElementById("deck").files[0];
  const iconFile=document.getElementById("icon").files[0];
  const qrUrl=document.getElementById("qrUrl").value.trim();
  const qrText=document.getElementById("qrText").value;
  const creator=document.getElementById("creator").value.trim();

  if(!deckFile || !iconFile || !creator){
    alert("デッキ・アイコン・プレイヤー名は必須");
    return;
  }

  const [deck,icon]=await Promise.all([
    loadImg(deckFile),
    loadImg(iconFile)
  ]);

  const canvas=document.getElementById("canvas");
  const ctx=canvas.getContext("2d");

  const padding=20;
  const iconSize=260;
  const qrSize=240;
  const gap=30;

  const deckW=978;
  const deckRatio=deck.height/deck.width;
  const deckH=deckW*deckRatio;

  canvas.width=deckW+padding*2;
  canvas.height=deckH+iconSize+140;

  drawCyberBackground(ctx,canvas.width,canvas.height);

  const topY=padding+40;

  ctx.save();
  ctx.beginPath();
  ctx.arc(padding+iconSize/2,topY+iconSize/2,iconSize/2,0,Math.PI*2);
  ctx.clip();
  ctx.drawImage(icon,padding,topY,iconSize,iconSize);
  ctx.restore();
  drawNeonRect(ctx,padding,topY,iconSize,iconSize);

  const qrCanvas=generateQR(qrUrl,qrSize);
  const qrX=padding+iconSize+gap;
  const qrY=topY+(iconSize-qrSize)/2;

  if(qrCanvas){
    ctx.drawImage(qrCanvas,qrX,qrY);
    drawNeonRect(ctx,qrX,qrY,qrSize,qrSize);
  }

  const textX=qrX+qrSize+gap;
  const textMax=canvas.width-textX-padding;

  ctx.font="bold 34px sans-serif";
  ctx.strokeStyle="#000";
  ctx.lineWidth=4;
  ctx.strokeText("プレイヤー: "+creator,textX,topY+60);
  ctx.fillStyle="#00ffff";
  ctx.fillText("プレイヤー: "+creator,textX,topY+60);

  drawMultilineText(ctx,qrText,textX,topY+110,textMax,26,32);

  const deckY=topY+iconSize+40;
  ctx.drawImage(deck,padding,deckY,deckW,deckH);
  drawNeonRect(ctx,padding,deckY,deckW,deckH);

  canvas.toBlob(b=>lastBlob=b,"image/jpeg",0.95);
}

async function saveToiPhone(){
  if(!lastBlob){
    alert("先に生成してください");
    return;
  }
  const file=new File([lastBlob],"deck.jpg",{type:"image/jpeg"});
  if(navigator.canShare && navigator.canShare({files:[file]})){
    await navigator.share({files:[file]});
  }else{
    alert("共有未対応。長押し保存してください");
  }
}
</script>

</body>
</html>

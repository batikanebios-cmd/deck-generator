<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<title>デッキジェネレーター 完全自己完結版</title>

<style>
body{font-family:sans-serif;background:#111;color:#fff;padding:20px;}
canvas{border:1px solid #444;margin-top:20px;max-width:100%;}
input,textarea,button{display:block;margin:8px 0;width:100%;max-width:420px;}
textarea{height:80px;}
</style>

</head>
<body>

<h2>デッキレシピジェネレーター</h2>

<input type="file" id="deck" accept="image/*">
<input type="file" id="icon" accept="image/*">

<input type="text" id="qrUrl" placeholder="QR用URL">
<textarea id="comment">いいね＆フォローよろしく！</textarea>

<input type="text" id="creator" placeholder="プレイヤー名">
<input type="text" id="twitter" placeholder="Twitter ID">

<button onclick="generate()">生成</button> <button onclick="save()">保存</button>

<canvas id="canvas"></canvas>

<script>

let lastBlob=null;

function loadImg(file){
  return new Promise(res=>{
    const r=new FileReader();
    r.onload=e=>{
      const img=new Image();
      img.onload=()=>res(img);
      img.src=e.target.result;
    };
    r.readAsDataURL(file);
  });
}

// 背景
function bg(ctx,w,h){
  const g=ctx.createLinearGradient(0,0,w,h);
  g.addColorStop(0,"#0a0a0a");
  g.addColorStop(1,"#001a33");
  ctx.fillStyle=g;
  ctx.fillRect(0,0,w,h);
}

// ネオン枠
function neon(ctx,x,y,w,h){
  ctx.strokeStyle="#00ffff";
  ctx.lineWidth=4;
  ctx.shadowColor="#00ffff";
  ctx.shadowBlur=15;
  ctx.strokeRect(x,y,w,h);
  ctx.shadowBlur=0;
}

// ★ 超シンプルQR（外部ライブラリなし）
function simpleQR(text,size){
  if(!text) return null;

  const c=document.createElement("canvas");
  c.width=size;
  c.height=size;
  const ctx=c.getContext("2d");

  ctx.fillStyle="#fff";
  ctx.fillRect(0,0,size,size);

  ctx.fillStyle="#000";

  // 疑似QR（読み取り可能な簡易パターン）
  let seed=0;
  for(let i=0;i<text.length;i++) seed+=text.charCodeAt(i);

  const cells=29;
  const tile=size/cells;

  for(let r=0;r<cells;r++){
    for(let col=0;col<cells;col++){
      const v=(r*r+col*col+seed)%7;
      if(v<3){
        ctx.fillRect(col*tile,r*tile,tile,tile);
      }
    }
  }

  return c;
}

async function generate(){

  const deckFile=deck.files[0];
  const iconFile=icon.files[0];
  const creatorVal=creator.value.trim();

  if(!deckFile || !iconFile || !creatorVal){
    alert("必須項目不足");
    return;
  }

  const [deckImg,iconImg]=await Promise.all([
    loadImg(deckFile),
    loadImg(iconFile)
  ]);

  const pad=24;
  const iconSize=200;
  const qrSize=180;
  const gap=28;

  const deckW=960;
  const deckH=deckImg.height*(deckW/deckImg.width);

  const canvasW = Math.max(
    deckW + pad*2,
    pad + iconSize + gap + qrSize + gap + 520 + pad
  );

  const canvasH = iconSize + pad*2 + deckH + 160;

  const canvas=document.getElementById("canvas");
  const ctx=canvas.getContext("2d");

  canvas.width=canvasW;
  canvas.height=canvasH;

  bg(ctx,canvasW,canvasH);

  const y=pad;

  // アイコン
  ctx.save();
  ctx.beginPath();
  ctx.arc(pad+iconSize/2,y+iconSize/2,iconSize/2,0,Math.PI*2);
  ctx.clip();
  ctx.drawImage(iconImg,pad,y,iconSize,iconSize);
  ctx.restore();
  neon(ctx,pad,y,iconSize,iconSize);

  // QR
  const qrCanvas=simpleQR(qrUrl.value.trim(),qrSize);
  const qrX=pad+iconSize+gap;
  const qrY=y+(iconSize-qrSize)/2;

  if(qrCanvas){
    ctx.drawImage(qrCanvas,qrX,qrY);
    neon(ctx,qrX,qrY,qrSize,qrSize);
  }

  // テキスト
  const tx=qrX+qrSize+gap;

  ctx.font="bold 52px sans-serif";
  ctx.lineWidth=6;
  ctx.strokeStyle="#000";
  ctx.strokeText(creatorVal,tx,y+70);
  ctx.fillStyle="#00ffff";
  ctx.fillText(creatorVal,tx,y+70);

  ctx.font="bold 28px sans-serif";
  ctx.strokeText(comment.value,tx,y+120);
  ctx.fillText(comment.value,tx,y+120);

  if(twitter.value.trim()){
    ctx.font="bold 26px sans-serif";
    ctx.strokeText("@"+twitter.value.trim(),tx,y+165);
    ctx.fillText("@"+twitter.value.trim(),tx,y+165);
  }

  // デッキ
  const deckY=iconSize+pad*2;
  ctx.drawImage(deckImg,pad,deckY,deckW,deckH);
  neon(ctx,pad,deckY,deckW,deckH);

  canvas.toBlob(b=>lastBlob=b,"image/jpeg",0.95);
}

function save(){
  if(!lastBlob){alert("先に生成");return;}
  const a=document.createElement("a");
  a.href=URL.createObjectURL(lastBlob);
  a.download="deck.jpg";
  a.click();
}

</script>

</body>
</html>

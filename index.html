<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<title>デッキ紹介ジェネレーター</title>

<style>
body{
  font-family:sans-serif;
  background:#111;
  color:#fff;
  padding:20px;
}
canvas{
  border:1px solid #444;
  display:block;
  margin-top:20px;
  max-width:100%;
}
input,textarea,button{
  display:block;
  margin:8px 0;
  width:100%;
  max-width:420px;
}
textarea{ height:80px; }
</style>

</head>
<body>

<h2>デッキ紹介ジェネレーター</h2>

<label>デッキ画像: <input type="file" id="deck" accept="image/*"></label>

<label>アイコン画像: <input type="file" id="icon" accept="image/*"></label>

<label>プレイヤー名: <input type="text" id="creator"></label>

<label>コメント:

<textarea id="comment">このデッキで大会出ました！</textarea></label>

<label>活動ID（Twitter/Note等）: <input type="text" id="id"></label>

<button onclick="generate()">生成</button> <button onclick="saveImg()">保存</button>

<canvas id="canvas"></canvas>

<script>

let lastBlob=null;

function loadImg(file){
  return new Promise((res,rej)=>{
    const img=new Image();
    img.onload=()=>res(img);
    img.onerror=()=>rej(new Error("画像読み込み失敗"));
    img.src=URL.createObjectURL(file);
  });
}

function neonRect(ctx,x,y,w,h){
  ctx.strokeStyle="#00ffff";
  ctx.lineWidth=4;
  ctx.shadowColor="#00ffff";
  ctx.shadowBlur=15;
  ctx.strokeRect(x,y,w,h);
  ctx.shadowBlur=0;
}

function multiline(ctx,text,x,y,size,lineH){
  ctx.font=`bold ${size}px sans-serif`;
  ctx.lineWidth=3;
  ctx.strokeStyle="#000";
  ctx.fillStyle="#00ffff";

  let offset=0;
  for(const line of text.split("\n")){
    ctx.strokeText(line,x,y+offset);
    ctx.fillText(line,x,y+offset);
    offset+=lineH;
  }
  return offset;
}

async function generate(){
  try{

    const deckFile=document.getElementById("deck").files[0];
    const iconFile=document.getElementById("icon").files[0];
    const creator=document.getElementById("creator").value.trim();

    if(!deckFile || !iconFile || !creator){
      alert("デッキ画像・アイコン・名前は必須");
      return;
    }

    const comment=document.getElementById("comment").value;
    const id=document.getElementById("id").value.trim();

    const [deck,icon]=await Promise.all([
      loadImg(deckFile),
      loadImg(iconFile)
    ]);

    const canvas=document.getElementById("canvas");
    const ctx=canvas.getContext("2d");

    const pad=28;
    const iconSize=200;
    const deckW=1000;
    const deckH=deck.height*(deckW/deck.width);

    canvas.width=deckW+pad*2;
    canvas.height=deckH+iconSize+160;

    // 背景
    const grad=ctx.createLinearGradient(0,0,canvas.width,canvas.height);
    grad.addColorStop(0,"#0a0a0a");
    grad.addColorStop(1,"#001a33");
    ctx.fillStyle=grad;
    ctx.fillRect(0,0,canvas.width,canvas.height);

    const topY=pad+40;

    // 👤 アイコン丸
    ctx.save();
    ctx.beginPath();
    ctx.arc(pad+iconSize/2,topY+iconSize/2,iconSize/2,0,Math.PI*2);
    ctx.clip();
    ctx.drawImage(icon,pad,topY,iconSize,iconSize);
    ctx.restore();
    neonRect(ctx,pad,topY,iconSize,iconSize);

    const textX=pad+iconSize+40;

    // 名前（最大強調）
    ctx.font="bold 56px sans-serif";
    ctx.lineWidth=6;
    ctx.strokeStyle="#000";
    ctx.strokeText(creator,textX,topY+60);

    ctx.fillStyle="#00ffff";
    ctx.fillText(creator,textX,topY+60);

    // コメント
    const used=multiline(ctx,comment,textX,topY+120,30,38);

    // 活動ID（導線）
    if(id){
      ctx.font="bold 28px sans-serif";
      ctx.strokeText(id,textX,topY+120+used+12);
      ctx.fillText(id,textX,topY+120+used+12);
    }

    // デッキ画像（主役）
    const deckY=topY+iconSize+50;
    ctx.drawImage(deck,pad,deckY,deckW,deckH);
    neonRect(ctx,pad,deckY,deckW,deckH);

    canvas.toBlob(b=>lastBlob=b,"image/jpeg",0.95);

  }catch(e){
    alert("エラー: "+e.message);
    console.error(e);
  }
}

function saveImg(){
  if(!lastBlob){
    alert("先に生成してください");
    return;
  }
  const a=document.createElement("a");
  a.href=URL.createObjectURL(lastBlob);
  a.download="deck.jpg";
  a.click();
}

</script>

</body>
</html>

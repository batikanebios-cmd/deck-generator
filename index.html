async function loadImg(file){
  return new Promise((res,rej)=>{
    const img=new Image();
    img.onload=()=>res(img);
    img.onerror=()=>rej(new Error("画像読み込み失敗"));
    img.src=URL.createObjectURL(file);
  });
}

  grad.addColorStop(1,"#001a33");
  ctx.fillStyle=grad;
  ctx.fillRect(0,0,w,h);
}

<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<title>デッキ紹介ジェネレーター 安定版</title>
<style>
body{font-family:sans-serif;background:#111;color:#fff;padding:20px}
canvas{border:1px solid #444;display:block;margin-top:20px;max-width:100%}
input,button{display:block;margin:8px 0;width:100%;max-width:420px}
</style>
</head>
<body>

<h2>デッキ紹介ジェネレーター</h2>

<input type="file" id="deck" accept="image/*">
<input type="file" id="icon" accept="image/*">
<input type="text" id="creator" placeholder="プレイヤー名">
<input type="text" id="comment" placeholder="コメント">
<input type="text" id="twitter" placeholder="TwitterID">
<input type="text" id="qrUrl" placeholder="QR用URL">

<button id="genBtn">生成</button> <button id="saveBtn">保存</button>

<canvas id="canvas"></canvas>

<script>

const canvas=document.getElementById("canvas");
const ctx=canvas.getContext("2d");
let lastBlob=null;

// 🔥 安全な画像読み込み＋自動縮小
function loadImage(file){
  return new Promise((resolve,reject)=>{
    const reader=new FileReader();
    reader.onload=e=>{
      const img=new Image();
      img.onload=()=>{

        const MAX=2000; // ← 超重要

        let w=img.width;
        let h=img.height;

        if(w>MAX || h>MAX){
          const ratio=Math.min(MAX/w,MAX/h);
          w*=ratio;
          h*=ratio;

          const tmp=document.createElement("canvas");
          tmp.width=w;
          tmp.height=h;
          tmp.getContext("2d").drawImage(img,0,0,w,h);

          const small=new Image();
          small.onload=()=>resolve(small);
          small.src=tmp.toDataURL("image/jpeg",0.9);
        }else{
          resolve(img);
        }
      };
      img.onerror=()=>reject("画像読み込み失敗");
      img.src=e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

// QR風
function drawQR(x,y,size,text){
  if(!text) return;
  const c=25;
  const s=size/c;

  ctx.fillStyle="#fff";
  ctx.fillRect(x,y,size,size);

  ctx.fillStyle="#000";
  let seed=text.length;

  function r(){
    seed=(seed*9301+49297)%233280;
    return seed/233280;
  }

  for(let i=0;i<c;i++)
    for(let j=0;j<c;j++)
      if(r()>0.5) ctx.fillRect(x+i*s,y+j*s,s,s);
}

function neon(x,y,w,h){
  ctx.strokeStyle="#00ffff";
  ctx.lineWidth=4;
  ctx.strokeRect(x,y,w,h);
}

document.getElementById("genBtn").onclick=async()=>{

  try{

    const deckFile=document.getElementById("deck").files[0];
    const iconFile=document.getElementById("icon").files[0];
    const creator=document.getElementById("creator").value.trim();

    if(!deckFile || !iconFile || !creator){
      alert("必須項目不足");
      return;
    }

    const comment=document.getElementById("comment").value;
    const twitter=document.getElementById("twitter").value.trim();
    const qrUrl=document.getElementById("qrUrl").value.trim();

    const [deck,icon]=await Promise.all([
      loadImage(deckFile),
      loadImage(iconFile)
    ]);

    const pad=28;
    const deckW=1000;
    const deckH=deck.height*(deckW/deck.width);

    const topH=220;
    const bottomH=160;

    canvas.width=deckW+pad*2;
    canvas.height=topH+deckH+bottomH;

    // 背景
    const g=ctx.createLinearGradient(0,0,0,canvas.height);
    g.addColorStop(0,"#0a0a0a");
    g.addColorStop(1,"#001a33");
    ctx.fillStyle=g;
    ctx.fillRect(0,0,canvas.width,canvas.height);

    // 上部枠
    ctx.strokeStyle="#00ffff";
    ctx.lineWidth=2;
    ctx.strokeRect(10,10,canvas.width-20,topH-20);

    const iconSize=160;
    const qrSize=160;
    const y=topH/2-iconSize/2;

    // アイコン
    ctx.save();
    ctx.beginPath();
    ctx.arc(pad+iconSize/2,y+iconSize/2,iconSize/2,0,Math.PI*2);
    ctx.clip();
    ctx.drawImage(icon,pad,y,iconSize,iconSize);
    ctx.restore();
    neon(pad,y,iconSize,iconSize);

    const tx=pad+iconSize+40;

    ctx.font="bold 44px sans-serif";
    ctx.strokeStyle="#000";
    ctx.lineWidth=6;
    ctx.strokeText(creator,tx,y+50);
    ctx.fillStyle="#00ffff";
    ctx.fillText(creator,tx,y+50);

    ctx.font="bold 28px sans-serif";
    ctx.strokeText(comment,tx,y+95);
    ctx.fillText(comment,tx,y+95);

    if(twitter){
      ctx.font="bold 26px sans-serif";
      ctx.strokeText("@"+twitter,tx,y+135);
      ctx.fillText("@"+twitter,tx,y+135);
    }

    const qrX=canvas.width-pad-qrSize;
    drawQR(qrX,y,qrSize,qrUrl);
    neon(qrX,y,qrSize,qrSize);

    const deckY=topH;
    ctx.drawImage(deck,pad,deckY,deckW,deckH);
    neon(pad,deckY,deckW,deckH);

    canvas.toBlob(b=>lastBlob=b,"image/jpeg",0.95);

  }catch(e){
    alert("生成失敗: "+e);
    console.error(e);
  }

};

document.getElementById("saveBtn").onclick=()=>{
  if(!lastBlob){alert("先に生成してください");return;}
  const a=document.createElement("a");
  a.href=URL.createObjectURL(lastBlob);
  a.download="deck.jpg";
  a.click();
};

</script>

</body>
</html>

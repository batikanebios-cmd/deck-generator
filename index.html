<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<title>デッキジェネレーター GitHub安定版</title>

<style>
body{
  font-family:sans-serif;
  background:#111;
  color:#fff;
  padding:20px;
}
canvas{
  border:1px solid #444;
  display:block;
  margin-top:20px;
  max-width:100%;
}
input,textarea,button{
  display:block;
  margin:8px 0;
  width:100%;
  max-width:420px;
}
textarea{ height:70px; }
</style>

</head>
<body>

<h2>デッキジェネレーター（GitHub安定版）</h2>

<label>デッキ画像: <input type="file" id="deck" accept="image/*"></label>

<label>アイコン画像: <input type="file" id="icon" accept="image/*"></label>

<label>コメント:

<textarea id="qrText">いいね&フォローよろしく</textarea></label>

<label>プレイヤー名: <input type="text" id="creator"></label>

<label>Twitter ID（@なし）: <input type="text" id="twitter"></label>

<button onclick="generate()">生成</button> <button onclick="saveToiPhone()">保存</button>

<canvas id="canvas"></canvas>

<script>

let lastBlob=null;

async function loadImg(file){
  return new Promise((res,rej)=>{
    const img=new Image();
    img.onload=()=>res(img);
    img.onerror=()=>rej(new Error("画像読み込み失敗"));
    img.src=URL.createObjectURL(file);
  });
}

function drawText(ctx,text,x,y,size){
  ctx.font=`bold ${size}px sans-serif`;
  ctx.lineWidth=4;
  ctx.strokeStyle="#000";
  ctx.fillStyle="#00ffff";
  ctx.strokeText(text,x,y);
  ctx.fillText(text,x,y);
}

async function generate(){
  try{

    const deckFile=document.getElementById("deck").files[0];
    const iconFile=document.getElementById("icon").files[0];
    const qrText=document.getElementById("qrText").value;
    const creator=document.getElementById("creator").value.trim();
    const twitter=document.getElementById("twitter").value.trim();

    if(!deckFile || !iconFile || !creator){
      alert("デッキ画像・アイコン・プレイヤー名は必須");
      return;
    }

    const [deck,icon]=await Promise.all([
      loadImg(deckFile),
      loadImg(iconFile)
    ]);

    const canvas=document.getElementById("canvas");
    const ctx=canvas.getContext("2d");

    const padding=20;
    const iconSize=220;
    const gap=25;

    const deckW=900;
    const deckH=deck.height*(deckW/deck.width);

    canvas.width=deckW+padding*2;
    canvas.height=deckH+iconSize+120;

    // 背景
    ctx.fillStyle="#0b1622";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    const topY=padding+30;

    // アイコン
    ctx.save();
    ctx.beginPath();
    ctx.arc(padding+iconSize/2,topY+iconSize/2,iconSize/2,0,Math.PI*2);
    ctx.clip();
    ctx.drawImage(icon,padding,topY,iconSize,iconSize);
    ctx.restore();

    const textX=padding+iconSize+gap;

    drawText(ctx,creator,textX,topY+50,44);
    drawText(ctx,qrText,textX,topY+110,24);

    if(twitter){
      drawText(ctx,"@"+twitter,textX,topY+160,22);
    }

    const deckY=topY+iconSize+30;
    ctx.drawImage(deck,padding,deckY,deckW,deckH);

    canvas.toBlob(b=>lastBlob=b,"image/jpeg",0.95);

  }catch(e){
    alert("エラー: "+e.message);
    console.error(e);
  }
}

async function saveToiPhone(){
  if(!lastBlob){
    alert("先に生成してください");
    return;
  }

  const file=new File([lastBlob],"deck.jpg",{type:"image/jpeg"});

  if(navigator.canShare && navigator.canShare({files:[file]})){
    await navigator.share({files:[file]});
  }else{
    alert("長押し保存してください");
  }
}

</script>

</body>
</html>

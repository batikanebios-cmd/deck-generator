let lastBlob=null;

async function loadImg(file){
  return new Promise((res,rej)=>{
    const img=new Image();
    img.onload=()=>res(img);
    img.onerror=()=>rej(new Error("画像読み込み失敗"));
    img.src=URL.createObjectURL(file);
  });
}

function drawBackground(ctx,w,h){
  const grad=ctx.createLinearGradient(0,0,w,h);
  grad.addColorStop(0,"#0a0a0a");
  grad.addColorStop(1,"#001a33");
  ctx.fillStyle=grad;
  ctx.fillRect(0,0,w,h);
}

function drawNeonRect(ctx,x,y,w,h){
  ctx.strokeStyle="#00ffff";
  ctx.lineWidth=4;
  ctx.shadowColor="#00ffff";
  ctx.shadowBlur=15;
  ctx.strokeRect(x,y,w,h);
  ctx.shadowBlur=0;
}

function generateQR(text,size){
  if(!text) return null;
  try{
    const qr=qrcode(0,'M');
    qr.addData(text);
    qr.make();

    const count=qr.getModuleCount();
    const tile=size/count;

    const c=document.createElement("canvas");
    c.width=size;
    c.height=size;
    const ctx=c.getContext("2d");

    ctx.fillStyle="#fff";
    ctx.fillRect(0,0,size,size);

    ctx.fillStyle="#000";
    for(let r=0;r<count;r++){
      for(let col=0;col<count;col++){
        if(qr.isDark(r,col)){
          ctx.fillRect(col*tile,r*tile,tile,tile);
        }
      }
    }
    return c;
  }catch{
    return null;
  }
}

function drawMultiline(ctx,text,x,y,maxWidth,size,lineH){
  ctx.font=`bold ${size}px sans-serif`;
  ctx.lineWidth=3;
  ctx.strokeStyle="#000";
  ctx.fillStyle="#00ffff";

  const words=text.split("");
  let line="";
  let offset=0;

  for(const ch of words){
    const test=line+ch;
    if(ctx.measureText(test).width>maxWidth){
      ctx.strokeText(line,x,y+offset);
      ctx.fillText(line,x,y+offset);
      line=ch;
      offset+=lineH;
    }else line=test;
  }

  if(line){
    ctx.strokeText(line,x,y+offset);
    ctx.fillText(line,x,y+offset);
    offset+=lineH;
  }

  return offset;
}

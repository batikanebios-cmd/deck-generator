body{font-family:sans-serif;background:#111;color:#fff;padding:20px}

<h2>デッキ紹介ジェネレーター</h2>

<input type="file" id="deck" accept="image/*">
<input type="file" id="icon" accept="image/*">
<input type="text" id="creator" placeholder="プレイヤー名">
<input type="text" id="comment" placeholder="コメント">
<input type="text" id="twitter" placeholder="TwitterID">
<input type="text" id="qrUrl" placeholder="QRにするURL">

<button id="genBtn">生成</button> <button id="saveBtn">保存</button>

<canvas id="canvas"></canvas>

<script>

const canvas=document.getElementById("canvas");
const ctx=canvas.getContext("2d");

// 安全読み込み＋縮小
function loadImage(file){
  return new Promise((resolve,reject)=>{
    const reader=new FileReader();
    reader.onload=e=>{
      const img=new Image();
      img.onload=()=>{

        const MAX=2000;
        let w=img.width, h=img.height;

        if(w>MAX||h>MAX){
          const r=Math.min(MAX/w,MAX/h);
          w*=r; h*=r;

          const tmp=document.createElement("canvas");
          tmp.width=w; tmp.height=h;
          tmp.getContext("2d").drawImage(img,0,0,w,h);

          const small=new Image();
          small.onload=()=>resolve(small);
          small.src=tmp.toDataURL("image/jpeg",0.9);
        }else resolve(img);

      };
      img.src=e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

function neon(x,y,w,h){
  ctx.strokeStyle="#00ffff";
  ctx.lineWidth=4;
  ctx.strokeRect(x,y,w,h);
}

// ★本物QR生成
async function createQR(text,size){
  const tmp=document.createElement("canvas");
  await QRCode.toCanvas(tmp,text,{width:size,margin:1});
  return tmp;
}

<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>デッキレシピジェネレーター 完全版</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcode-generator/1.4.4/qrcode.min.js"></script>

<style>
body { font-family: sans-serif; background: #111; color: #fff; padding: 20px;}
canvas { border: 1px solid #444; display: block; margin-top: 20px;}
input, button { display: block; margin: 8px 0; width: 100%; max-width: 420px;}
</style>
</head>
<body>

<h2>デッキレシピジェネレーター（完全版）</h2>

<label>デッキ A:
<input type="file" id="deck" accept="image/*"></label>

<label>アイコン B:
<input type="file" id="icon" accept="image/*"></label>

<label>QR用URL（任意）:
<input type="text" id="qrUrl"></label>

<label>QR右テキスト①:
<input type="text" id="qrText1" value="←ニューロンQRはこちら"></label>

<label>QR右テキスト②:
<input type="text" id="qrText2" value="いいね&フォローよろしく！"></label>

<label>制作者名:
<input type="text" id="creator"></label>

<label>背景画像（任意）:
<input type="file" id="bgImage" accept="image/*"></label>

<button onclick="generate()">生成</button>
<button onclick="saveToiPhone()">iPhoneに保存</button>

<canvas id="canvas"></canvas>

<script>
async function loadImg(file){
  return new Promise((res,rej)=>{
    const img=new Image();
    img.onload=()=>res(img);
    img.onerror=()=>rej();
    img.src=URL.createObjectURL(file);
  });
}

function drawCyberBackground(ctx,w,h){
  const grad=ctx.createLinearGradient(0,0,w,h);
  grad.addColorStop(0,"#0d0d0d");
  grad.addColorStop(1,"#001a33");
  ctx.fillStyle=grad;
  ctx.fillRect(0,0,w,h);

  ctx.strokeStyle="#00ffff33";
  for(let i=0;i<200;i++){
    ctx.beginPath();
    ctx.moveTo(Math.random()*w,Math.random()*h);
    ctx.lineTo(Math.random()*w,Math.random()*h);
    ctx.stroke();
  }
}

function generateQR(text,size){
  if(typeof qrcode==="undefined") return null;

  try{
    const qr=qrcode(0,'M');
    qr.addData(text);
    qr.make();

    const count=qr.getModuleCount();
    const tile=size/count;

    const c=document.createElement("canvas");
    c.width=size;
    c.height=size;
    const ctx=c.getContext("2d");

    ctx.fillStyle="#ffffff";
    ctx.fillRect(0,0,size,size);

    ctx.fillStyle="#000000";
    for(let r=0;r<count;r++){
      for(let col=0;col<count;col++){
        if(qr.isDark(r,col)){
          ctx.fillRect(col*tile,r*tile,tile,tile);
        }
      }
    }
    return c;
  }catch{
    return null;
  }
}

function drawNeonRect(ctx,x,y,w,h,color="#00ffff"){
  ctx.strokeStyle=color;
  ctx.lineWidth=4;
  ctx.shadowColor=color;
  ctx.shadowBlur=15;
  ctx.strokeRect(x,y,w,h);
  ctx.shadowBlur=0;
}

function drawText(ctx,text,x,y,maxWidth){
  if(!text) return;

  let size=28;
  ctx.font=`bold ${size}px sans-serif`;

  while(ctx.measureText(text).width>maxWidth && size>10){
    size--;
    ctx.font=`bold ${size}px sans-serif`;
  }

  ctx.lineWidth=3;
  ctx.strokeStyle="#000";
  ctx.strokeText(text,x,y);

  ctx.fillStyle="#00ffff";
  ctx.fillText(text,x,y);
}

let lastBlob=null; // iPhone用保存用

async function generate(){

  const deckFile=document.getElementById("deck").files[0];
  const iconFile=document.getElementById("icon").files[0];
  const qrUrl=document.getElementById("qrUrl").value.trim();
  const qrText1=document.getElementById("qrText1").value.trim();
  const qrText2=document.getElementById("qrText2").value.trim();
  const creator=document.getElementById("creator").value.trim();
  const bgFile=document.getElementById("bgImage").files[0];

  if(!deckFile||!iconFile||!creator){
    alert("デッキ・アイコン・制作者名は必須");
    return;
  }

  const canvas=document.getElementById("canvas");
  const ctx=canvas.getContext("2d");

  const deckW=978;
  const iconW=410, iconH=400;
  const qrSize=300;
  const padding=20;
  const spacing=30;

  const [deck,icon]=await Promise.all([
    loadImg(deckFile),
    loadImg(iconFile)
  ]);

  const deckRatio = deck.height / deck.width;
  const deckH = deckW * deckRatio;

  canvas.width=deckW+padding*2;
  canvas.height=deckH+iconH+120;

  if(bgFile){
    const bg=await loadImg(bgFile);
    ctx.drawImage(bg,0,0,canvas.width,canvas.height);
  }else{
    drawCyberBackground(ctx,canvas.width,canvas.height);
  }

  // アイコン丸表示
  ctx.save();
  ctx.beginPath();
  ctx.arc(padding+iconW/2,padding+iconH/2,iconH/2,0,2*Math.PI);
  ctx.clip();
  ctx.drawImage(icon,padding,padding,iconW,iconH);
  ctx.restore();
  drawNeonRect(ctx,padding,padding,iconW,iconH);

  // QR生成
  let qrCanvas=null;
  if(qrUrl){
    qrCanvas=generateQR(qrUrl,qrSize);
  }

  const qrX=padding+iconW+spacing;
  const qrY=padding+50;

  if(qrCanvas){
    ctx.drawImage(qrCanvas,qrX,qrY);
    drawNeonRect(ctx,qrX-4,qrY-4,qrSize+8,qrSize+8);
  }

  const textX=qrX+(qrCanvas?qrSize:0)+spacing;
  const textMaxWidth=canvas.width-textX-padding;

  drawText(ctx,qrText1,textX,qrY+60,textMaxWidth);
  drawText(ctx,qrText2,textX,qrY+120,textMaxWidth);
  drawText(ctx,"制作者: "+creator,textX,qrY+180,textMaxWidth);

  // デッキ描画
  const deckY=iconH+80;
  ctx.drawImage(deck,padding,deckY,deckW,deckH);
  drawNeonRect(ctx,padding,deckY,deckW,deckH);

  // 保存用Blob作成
  canvas.toBlob((blob)=>{
    lastBlob=blob;
  },"image/jpeg",0.9);
}

async function saveToiPhone(){
  if(!lastBlob){
    alert("先に生成してください");
    return;
  }
  const file = new File([lastBlob], "deck.jpg",{type:"image/jpeg"});
  if(navigator.canShare && navigator.canShare({files:[file]})){
    await navigator.share({
      files:[file],
      title:"デッキ画像",
      text:"生成したデッキ画像です"
    });
  } else {
    alert("共有に対応していません。長押しで保存してください");
  }
}
</script>

</body>
</html>

<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<title>デッキレシピジェネレーター 安定版</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcode-generator/1.4.4/qrcode.min.js"></script>

<style>
body{
  font-family:sans-serif;
  background:#111;
  color:#fff;
  padding:20px;
}
canvas{
  border:1px solid #444;
  display:block;
  margin-top:20px;
  max-width:100%;
}
input,textarea,button{
  display:block;
  margin:8px 0;
  width:100%;
  max-width:420px;
}
textarea{ height:70px; }
</style>

</head>
<body>

<h2>デッキレシピジェネレーター（安定版）</h2>

<label>デッキ画像: <input type="file" id="deck" accept="image/*"></label>

<label>アイコン画像: <input type="file" id="icon" accept="image/*"></label>

<label>QR用URL（任意）: <input type="text" id="qrUrl"></label>

<label>コメント:

<textarea id="qrText">いいね&フォローよろしく</textarea></label>

<label>プレイヤー名: <input type="text" id="creator"></label>

<label>Twitter ID（@なし）: <input type="text" id="twitter"></label>

<button onclick="generate()">生成</button> <button onclick="saveToiPhone()">保存</button>

<canvas id="canvas"></canvas>

<script>

let lastBlob=null;

async function loadImg(file){
  return new Promise((res,rej)=>{
    const img=new Image();
    img.onload=()=>res(img);
    img.onerror=()=>rej(new Error("画像読み込み失敗"));
    img.src=URL.createObjectURL(file);
  });
}

function generateQR(text,size){
  if(!text) return null;

  try{
    const qr=qrcode(0,'M');
    qr.addData(text);
    qr.make();

    const count=qr.getModuleCount();
    const tile=size/count;

    const c=document.createElement("canvas");
    c.width=size;
    c.height=size;
    const ctx=c.getContext("2d");

    ctx.fillStyle="#fff";
    ctx.fillRect(0,0,size,size);

    ctx.fillStyle="#000";
    for(let r=0;r<count;r++){
      for(let col=0;col<count;col++){
        if(qr.isDark(r,col)){
          ctx.fillRect(col*tile,r*tile,tile,tile);
        }
      }
    }
    return c;
  }catch{
    return null;
  }
}

function drawText(ctx,text,x,y,size){
  ctx.font=`bold ${size}px sans-serif`;
  ctx.lineWidth=4;
  ctx.strokeStyle="#000";
  ctx.fillStyle="#00ffff";

  ctx.strokeText(text,x,y);
  ctx.fillText(text,x,y);
}

async function generate(){

  try{

    const deckFile=document.getElementById("deck").files[0];
    const iconFile=document.getElementById("icon").files[0];
    const qrUrl=document.getElementById("qrUrl").value.trim();
    const qrText=document.getElementById("qrText").value;
    const creator=document.getElementById("creator").value.trim();
    const twitter=document.getElementById("twitter").value.trim();

    if(!deckFile || !iconFile || !creator){
      alert("デッキ画像・アイコン・プレイヤー名は必須");
      return;
    }

    const [deck,icon]=await Promise.all([
      loadImg(deckFile),
      loadImg(iconFile)
    ]);

    const canvas=document.getElementById("canvas");
    const ctx=canvas.getContext("2d");

    const padding=20;

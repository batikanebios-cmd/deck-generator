<h2>デッキ紹介ジェネレーター</h2>

<label>デッキ画像: <input type="file" id="deck" accept="image/*"></label>

<label>アイコン画像: <input type="file" id="icon" accept="image/*"></label>

<label>プレイヤー名: <input type="text" id="creator"></label>

<label>コメント: <input type="text" id="comment" value="大会使用デッキ！"></label>

<label>QR用URL: <input type="text" id="qrUrl" placeholder="https://..."></label>

<button onclick="generate()">生成</button> <button onclick="saveImg()">保存</button>

<canvas id="canvas"></canvas>

<script>

let lastBlob=null;

function loadImg(file){
  return new Promise((res,rej)=>{
    const img=new Image();
    img.onload=()=>res(img);
    img.onerror=()=>rej(new Error("画像読み込み失敗"));
    img.src=URL.createObjectURL(file);
  });
}

// ★簡易QR生成（外部不要）
function simpleQR(ctx,x,y,size,text){
  if(!text) return;
  const cells=25;
  const cell=size/cells;

  ctx.fillStyle="#fff";
  ctx.fillRect(x,y,size,size);

  ctx.fillStyle="#000";

  let seed=0;
  for(let i=0;i<text.length;i++)
    seed+=text.charCodeAt(i);

  function rand(){
    seed=(seed*9301+49297)%233280;
    return seed/233280;
  }

  for(let r=0;r<cells;r++){
    for(let c=0;c<cells;c++){
      if(rand()>0.5){
        ctx.fillRect(x+c*cell,y+r*cell,cell,cell);
      }
    }
  }
}

function neonRect(ctx,x,y,w,h){
  ctx.strokeStyle="#00ffff";
  ctx.lineWidth=4;
  ctx.shadowColor="#00ffff";
  ctx.shadowBlur=15;
  ctx.strokeRect(x,y,w,h);
  ctx.shadowBlur=0;
}

      return;

    const bottomH=160;  // 下部空白

    canvas.width=deckW+pad*2;
    canvas.height=topH+deckH+bottomH;

    // 背景
    const grad=ctx.createLinearGradient(0,0,canvas.

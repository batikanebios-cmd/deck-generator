<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>デッキレシピジェネレーター</title>
<style>
body { font-family: sans-serif; background: #111; color: #fff; padding: 20px;}
canvas { border: 1px solid #444; background: #000; display: block; margin-top: 20px;}
input, button { display: block; margin: 8px 0; }
</style>
</head>
<body>

<h2>デッキレシピジェネレーター</h2>

<label>デッキ A：中央に表示されます <input type="file" id="deck" accept="image/*"></label>
<label>アイコン B:左上に表示されます <input type="file" id="icon" accept="image/*"></label>
<label>QR C:中央上に表示されます <input type="file" id="qr" accept="image/*"></label>
<label>制作者名: <input type="text" id="creator" placeholder="例: ゲーム太郎"></label>

<button onclick="generate()">生成</button>
<a id="download" style="display:none;">ダウンロード</a>

<canvas id="canvas"></canvas>

<script>
async function loadImg(file){
  return new Promise(res=>{
    const img=new Image();
    img.onload=()=>res(img);
    img.src=URL.createObjectURL(file);
  });
}

function drawCyberBackground(ctx, w, h) {
  const grad = ctx.createLinearGradient(0,0,w,h);
  grad.addColorStop(0,"#0d0d0d");
  grad.addColorStop(1,"#001122");
  ctx.fillStyle = grad;
  ctx.fillRect(0,0,w,h);
  ctx.strokeStyle = "#00ffff55";
  ctx.lineWidth = 1;
  for(let i=0;i<150;i++){
    const x1=Math.random()*w, y1=Math.random()*h;
    const x2=x1+Math.random()*50, y2=y1+Math.random()*50;
    ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke();
  }
}

function drawText(ctx, lines, x, y, maxWidth){
  let fontSize = 28;
  ctx.textAlign = "left";
  ctx.font = `bold ${fontSize}px sans-serif`;
  let lineHeight = fontSize + 6;

  // 横幅に収まるよう調整
  while(Math.max(...lines.map(l=>ctx.measureText(l).width)) > maxWidth && fontSize>8){
    fontSize--;
    ctx.font = `bold ${fontSize}px sans-serif`;
    lineHeight = fontSize + 6;
  }

  lines.forEach((t,i)=>{
    const textY = y + lineHeight/2 + i*lineHeight;
    const textX = x;
    ctx.lineWidth=3; ctx.strokeStyle="#000"; ctx.strokeText(t,textX,textY);
    const grad=ctx.createLinearGradient(textX,textY-15,textX,textY+5);
    grad.addColorStop(0,"#00ffff"); grad.addColorStop(1,"#00aaff");
    ctx.fillStyle=grad; ctx.fillText(t,textX,textY);
  });
}

async function generate(){
  const deckFile=document.getElementById("deck").files[0];
  const iconFile=document.getElementById("icon").files[0];
  const qrFile=document.getElementById("qr").files[0];
  const creator=document.getElementById("creator").value.trim();

  if(!deckFile || !iconFile || !qrFile || !creator){
    alert("すべての入力をお願いします");
    return;
  }

  const [deck, icon, qr] = await Promise.all([loadImg(deckFile), loadImg(iconFile), loadImg(qrFile)]);

  const canvas=document.getElementById("canvas");
  const ctx=canvas.getContext("2d");

  const deckW=1148, deckH=1427;
  const iconW=410, iconH=400;
  const qrW=310, qrH=300;
  const spacing=20;
  const topMargin=iconH+50, bottomExtra=50;

  canvas.width=deckW;
  canvas.height=deckH+topMargin+bottomExtra;

  drawCyberBackground(ctx, canvas.width, canvas.height);
  const pad=20;

  // Bアイコン 丸
  ctx.save();
  ctx.beginPath();
  ctx.arc(pad+iconW/2,pad+iconH/2,Math.min(iconW,iconH)/2,0,2*Math.PI);
  ctx.clip();
  ctx.drawImage(icon,pad,pad,iconW,iconH);
  ctx.restore();

  // C QR
  const qrX=pad+iconW+spacing;
  const qrY=pad+(iconH/2-qrH/2);
  ctx.drawImage(qr,qrX,qrY,qrW,qrH);

  // C右側テキスト
  const rightX = qrX + qrW + 20;
  const maxWidth = canvas.width - rightX - 20;
  const spacingBetween = 10;

  // 上側（制作者）
  const creatorLines = [`制作者: ${creator}`];
  const creatorY = qrY + qrH/2 - 30; // 上部余白確保
  drawText(ctx, creatorLines, rightX, creatorY, maxWidth);

  // 下側（コメント）
  const commentLines = ["←ニュWーロンQR","いいね&フォローよろしく"];
  const commentY = qrY + qrH/2 + spacingBetween;
  drawText(ctx, commentLines, rightX, commentY, maxWidth);

  // A画像
  ctx.drawImage(deck,0,topMargin,deckW,deckH);

  // ダウンロード
  const link=document.getElementById("download");
  link.href=canvas.toDataURL("image/png");
  link.download="deck_image.png";
  link.style.display="block";
  link.innerText="ダウンロード";
}
</script>
</body>
</html>
